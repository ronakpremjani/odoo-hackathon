<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TransitOps — Thank You</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 70% 80%, #312e81 0%, #0f172a 50%, #020617 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: white;
      text-align: center;
    }
    .logo {
      width: 80px; height: 80px; border-radius: 16px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 1.6rem; margin: 0 auto 24px;
    }
    h1 { font-size: 2.8rem; font-weight: 800; }
    p { margin-top: 16px; font-size: 1.25rem; color: #cbd5e1; max-width: 640px; line-height: 1.6; }
    .highlight { color: #a5b4fc; font-weight: 600; }
  </style>
</head>
<body>
  <div>
    <div class="logo">TO</div>
    <h1>Thank You</h1>
    <p>
      <span class="highlight">TransitOps</span> — one platform, one source of truth.<br />
      Built for teams that move the world.
    </p>
  </div>
</body>
</html>
